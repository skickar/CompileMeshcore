name: Build Nibble Zero (Meshcore)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Keep building other variants even if one fails
      matrix:
        environment: 
          - nibble_zero_connect_repeater
          - nibble_zero_connect_repeater_bridge_espnow
          - nibble_zero_connect_terminal_chat
          - nibble_zero_connect_room_server
          - nibble_zero_connect_companion_radio_usb
          - nibble_zero_connect_companion_radio_ble
          - nibble_zero_connect_companion_radio_wifi

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Essential if MeshLib is a submodule

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Compile Environment (${{ matrix.environment }})
        run: pio run -e ${{ matrix.environment }}

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nibble_Zero_${{ matrix.environment }}
          path: |
            .pio/build/${{ matrix.environment }}/firmware.bin
            .pio/build/${{ matrix.environment }}/partitions.bin
            .pio/build/${{ matrix.environment }}/bootloader.bin
          retention-days: 7
