name: Build Nibble Zero (Meshcore)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: 
          - nibble_zero_connect_repeater
          - nibble_zero_connect_repeater_bridge_espnow
          - nibble_zero_connect_terminal_chat
          - nibble_zero_connect_room_server
          - nibble_zero_connect_companion_radio_usb
          - nibble_zero_connect_companion_radio_ble
          - nibble_zero_connect_companion_radio_wifi

    steps:
      # 1. Download your blank repo (with your custom configs) into a folder called 'custom_repo'
      - name: Checkout Custom Configs
        uses: actions/checkout@v4
        with:
          path: custom_repo

      # 2. Download the core Meshcore source code into a folder called 'meshcore_src'
      - name: Checkout Core Meshcore
        uses: actions/checkout@v4
        with:
          repository: liamcottle/REPLACE-WITH-ACTUAL-REPO # <-- ADD THE MESHCORE REPO NAME HERE
          path: meshcore_src
          submodules: recursive

      # 3. Inject your custom Nibble code into the Meshcore source
      - name: Inject Variant & Config
        run: |
          mkdir -p meshcore_src/variants
          # Copy your Nibble Zero hardware definitions into the Meshcore variants folder
          cp -r custom_repo/variants/nibble_zero_connect meshcore_src/variants/
          # Overwrite the default platformio.ini with your custom one
          cp custom_repo/platformio.ini meshcore_src/platformio.ini

      # 4. Standard PlatformIO setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            meshcore_src/.pio
          key: ${{ runner.os }}-pio-${{ hashFiles('custom_repo/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # 5. Tell PlatformIO to compile from INSIDE the meshcore folder where all the code now lives
      - name: Compile Environment (${{ matrix.environment }})
        working-directory: ./meshcore_src
        run: pio run -e ${{ matrix.environment }}

      # 6. Upload the final compiled binaries
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nibble_Zero_${{ matrix.environment }}
          path: |
            meshcore_src/.pio/build/${{ matrix.environment }}/firmware.bin
            meshcore_src/.pio/build/${{ matrix.environment }}/partitions.bin
            meshcore_src/.pio/build/${{ matrix.environment }}/bootloader.bin
          retention-days: 7
